services:
  # ===========================================
  # Backend API (FastAPI)
  # ===========================================
  backend:
    build: ./backend
    container_name: homecloud-api
    restart: unless-stopped

    # Internal port only - not exposed to host
    expose:
      - "8000"

    volumes:
      - homecloud_storage:/app/storage
      - homecloud_data:/app/data

    environment:
      # Security: Use .env file for secrets (never commit to git)
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set in .env}
      - DATABASE_URL=sqlite+aiosqlite:///./data/homecloud.db
      - STORAGE_PATH=/app/storage
      - MAX_STORAGE_BYTES=${MAX_STORAGE_BYTES:-107374182400}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      - PASSWORD_RESET_EXPIRE_MINUTES=${PASSWORD_RESET_EXPIRE_MINUTES:-30}
      - CORS_ORIGINS_STR=${CORS_ORIGINS:-https://cloud.chetas.me,http://localhost:3001}
      - ALLOW_REGISTRATION=${ALLOW_REGISTRATION:-false}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL:-}
      - RESEND_FROM_NAME=${RESEND_FROM_NAME:-Home Cloud}
      - RESEND_API_URL=${RESEND_API_URL:-https://api.resend.com/emails}
      - RESEND_TIMEOUT_SECONDS=${RESEND_TIMEOUT_SECONDS:-15}
      - PASSWORD_RESET_URL=${PASSWORD_RESET_URL:-}

    # Security: Run as non-root user
    user: "1000:1000"

    # Security: Read-only root filesystem where possible
    read_only: false

    # Security: Limit resources
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    networks:
      - homecloud_internal

  # ===========================================
  # Frontend (Nginx serving React build)
  # ===========================================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: homecloud-ui
    restart: unless-stopped

    # Internal only — Cloudflare Tunnel routes traffic here
    expose:
      - "80"

    # Also expose on host port 3001 for direct LAN access
    ports:
      - "3001:80"

    depends_on:
      backend:
        condition: service_healthy

    # Security: Read-only root filesystem
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp

    # Security: Limit resources
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 16M

    networks:
      - homecloud_internal

  # ===========================================
  # Cloudflare Tunnel — Auto-HTTPS, no ports needed
  # ===========================================
  tunnel:
    image: cloudflare/cloudflared:2024.12.0@sha256:1b92a01338a9a310cf5e1c7b77c61cce333e14117398814e4c124e4e9f7bbde2
    container_name: homecloud-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN:?TUNNEL_TOKEN must be set in .env}

    depends_on:
      - frontend

    networks:
      - homecloud_internal
      - homecloud_external

# ===========================================
# Named volumes for data persistence
# ===========================================
volumes:
  homecloud_storage:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${STORAGE_PATH:-/mnt/homecloud/storage}

  homecloud_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_PATH:-/mnt/homecloud/data}

# ===========================================
# Internal network (not exposed)
# ===========================================
networks:
  homecloud_internal:
    driver: bridge
    internal: true
  homecloud_external:
    driver: bridge
